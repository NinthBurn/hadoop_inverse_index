version: '3'

# replace 192.168.1.180 with your ip address

services:
  namenode:
    build: ./namenode
    image: hadoop-namenode
    platform: linux/amd64
    container_name: namenode
    restart: always
    ports:
      - 9870:9870
      - 9000:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=test
    env_file:
      - ./hadoop.env

  datanode_1:
    build: ./datanode
    image: hadoop-datanode
    platform: linux/amd64
    container_name: datanode_1
    restart: always
    ports:
      - "9864:9864"
      - "9866:9866"
    environment:
      SERVICE_PRECONDITION: 'namenode:9870'
      HDFS_CONF_dfs_datanode_hostname: 192.168.1.180
      HDFS_CONF_dfs_datanode_http_address: 0.0.0.0:9864
      HDFS_CONF_dfs_datanode_address: 0.0.0.0:9866
      HDFS_CONF_dfs_datanode_ipc_address: 0.0.0.0:9865
    volumes:
      - hadoop_datanode_1:/hadoop/dfs/data
    env_file:
      - ./hadoop.env
    depends_on:
      - namenode

  datanode_2:
    build: ./datanode
    image: hadoop-datanode
    platform: linux/amd64
    container_name: datanode_2
    restart: always
    ports:
      - "9867:9867"
      - "9868:9868"
    environment:
      SERVICE_PRECONDITION: 'namenode:9870'
      HDFS_CONF_dfs_datanode_hostname: 192.168.1.180
      HDFS_CONF_dfs_datanode_http_address: 0.0.0.0:9867
      HDFS_CONF_dfs_datanode_address: 0.0.0.0:9868
      HDFS_CONF_dfs_datanode_ipc_address: 0.0.0.0:9869
    volumes:
      - hadoop_datanode_2:/hadoop/dfs/data
    env_file:
      - ./hadoop.env
    depends_on:
      - namenode

  datanode_3:
    build: ./datanode
    image: hadoop-datanode
    platform: linux/amd64
    container_name: datanode_3
    restart: always
    ports:
      - "9871:9871"
      - "9872:9872"
    environment:
      SERVICE_PRECONDITION: 'namenode:9870'
      HDFS_CONF_dfs_datanode_hostname: 192.168.1.180
      HDFS_CONF_dfs_datanode_http_address: 0.0.0.0:9871
      HDFS_CONF_dfs_datanode_address: 0.0.0.0:9872
      HDFS_CONF_dfs_datanode_ipc_address: 0.0.0.0:9873
    volumes:
      - hadoop_datanode_3:/hadoop/dfs/data
    env_file:
      - ./hadoop.env
    depends_on:
      - namenode

  resourcemanager:
    build: ./resourcemanager
    image: hadoop-resourcemanager
    platform: linux/amd64
    container_name: resourcemanager
    restart: always
    ports:
      - 8088:8088
      - 8030:8030
      - 8031:8031
      - 8032:8032
    environment:
      SERVICE_PRECONDITION: 'namenode:9000 namenode:9870 192.168.1.180:9864 192.168.1.180:9868 192.168.1.180:9872'
    env_file:
      - ./hadoop.env

  nodemanager1:
    build: ./nodemanager
    image: hadoop-nodemanager
    platform: linux/amd64
    container_name: nodemanager
    restart: always
    environment:
      SERVICE_PRECONDITION: 'namenode:9000 namenode:9870 192.168.1.180:9864 192.168.1.180:9868 192.168.1.180:9872 resourcemanager:8088'
    env_file:
      - ./hadoop.env

  historyserver:
    build: ./historyserver
    image: hadoop-historyserver
    platform: linux/amd64
    container_name: historyserver
    restart: always
    ports:
      - 19888:19888
    environment:
      SERVICE_PRECONDITION: 'resourcemanager:8088'
    env_file:
      - ./hadoop.env
    depends_on:
      - resourcemanager

volumes:
  hadoop_namenode:
  hadoop_datanode_1:
  hadoop_datanode_2:
  hadoop_datanode_3:
  hadoop-historyserver:
